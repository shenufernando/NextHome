<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Property - NextHome</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow" style="max-width: 600px;">
        <h2 class="mb-4">Edit Property Details</h2>
        <form action="/edit_property/{{ property.id }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Property Title</label>
                <input type="text" name="title" class="form-control" value="{{ property.title }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" required>{{ property.description }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Price (Rs.)</label>
                <input type="number" name="price" class="form-control" value="{{ property.price }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contact Phone</label>
                <input type="text" name="contact_phone" class="form-control" value="{{ property.contact_phone }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" value="{{ property.location }}" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Update Property</button>
            <a href="{{ url_for('seller_dashboard') }}" class="btn btn-secondary w-100 mt-2">Cancel</a>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | NextHome Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="admin-wrapper">
        <div class="sidebar">
            <div class="sidebar-header">Next<span>Home</span></div>
            <div class="sidebar-menu">
                <a href="/admin_dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="{{ url_for('admin_bp.manage_users') }}"><i class="fas fa-users"></i> Manage Users</a>
                <a href="#"><i class="fas fa-building"></i> Properties</a>
               <form class="settings-form" method="POST" action="{{ url_for('admin_bp.settings') }}"></form>
                <a href="/logout" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <h2>Admin <span>Settings</span></h2>
                <p>Update your personal profile information and change your login password.</p>
            </div>

            <div class="settings-container">
                <form class="settings-form" method="POST" action="/settings">
                    <div class="form-group">
                        <label>Admin Full Name</label>
                        <input type="text" name="name" value="{{ admin_info.name }}" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" value="{{ admin_info.email }}" required>
                    </div>

                    <div class="form-group">
                        <label>New Password (Type here only to change password)</label>
                        <input type="password" name="password" placeholder="Leave blank to keep current password">
                    </div>

                    <button type="submit" class="btn-update">Save Settings</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Payment - NextHome</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Secure Payment</h4>
                    </div>
                    <div class="card-body">
                        <p><strong>Property:</strong> {{ post.title }}</p>
                        <p class="text-danger"><strong>Amount to Pay: Rs. 3000.00</strong></p>
                        <hr>
                        <form method="POST">
                            <div class="form-group">
                                <label>Card Number</label>
                                <input type="text" class="form-control" placeholder="0000 0000 0000 0000" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label>Expiry Date</label>
                                    <input type="text" class="form-control" placeholder="MM/YY" required>
                                </div>
                                <div class="form-group col-md-6">
                                    <label>CVV</label>
                                    <input type="password" class="form-control" placeholder="123" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg btn-block">Confirm & Publish Post</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
